<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hochzeit Sailes</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400&family=Great+Vibes&display=swap"
    rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {

          colors: {

            wedding: {
              dark: '#4b3a32',
              paper: '#6d574c',
              light: '#d7c1b3',
              cream: '#f4ede7',
              gold: '#c8a58b'
            }

          },

          fontFamily: {

            heading: ['Cormorant Garamond', 'serif'],
            body: ['Montserrat', 'sans-serif'],
            signature: ['Great Vibes', 'cursive']

          }

        }
      }
    }
  </script>
</head>

<body class="min-h-screen bg-cover bg-center bg-fixed font-body text-wedding-cream"
  style="background-image: url('background_saile.jpg');">

  <!-- Dunkles Overlay -->
  <div class="min-h-screen bg-black/45 backdrop-blur-[2px]">

    <!-- Content -->
    <div class="max-w-6xl mx-auto px-6 py-16">
      <!-- Container -->
      <div class="w-full py-12">

        <!-- Login Box -->
        <div id="loginBox" class="bg-[#5a463d]/70
       backdrop-blur-xl
       border border-white/10
       rounded-[32px]
       shadow-2xl
       p-10">

          <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-wedding-cream">
              Hochzeit Sailes 2026
            </h1>

            <p class="text-wedding-light mt-2">
              Bitte Passwort eingeben
            </p>
          </div>

          <input type="password" id="passwordInput" placeholder="Passwort"
            class="w-full border border-gray-300 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-emerald-400" />

          <button onclick="checkPassword()"
            class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold p-4 rounded-xl transition">
            Öffnen
          </button>

          <p id="loginError" class="text-red-500 text-center mt-4"></p>
        </div>

        <!-- App -->
        <div id="app" class="hidden">

          <!-- Header -->
          <div class="text-center mb-12">

            <h1 class="font-heading text-6xl md:text-7xl font-light tracking-wide">
              Snackliste Hochzeit Sailes
            </h1>

            <p class="mt-6 text-wedding-light tracking-[0.25em] uppercase text-sm leading-7">
              Trage ein, welchen Salat (Buffet)
              oder welchen Happen (Sektempfang)
              du mitbringst
            </p>

          </div>

          <!-- Main Card -->
          <div class="grid lg:grid-cols-2 overflow-hidden rounded-[32px]
           border border-white/10
           bg-[#5a463d]/70
           backdrop-blur-xl
           shadow-2xl">
            <div class="p-12
         border-r border-white/10
         bg-black/5">
              <form id="snackForm" class="space-y-5">

                <!-- Name -->
                <div>
                  <label class="block mb-3
                                text-xs
                                uppercase
                                tracking-[0.25em]
                                text-wedding-light/80
                                font-light">
                    Dein Name
                  </label>

                  <input type="text" name="name" required class="w-full
       bg-white/5
       border border-white/10
       rounded-2xl
       px-5 py-4
       text-wedding-cream
       placeholder:text-wedding-light/40
       font-light
       tracking-wide
       backdrop-blur-sm
       focus:outline-none
       focus:border-wedding-gold
       focus:bg-white/10
       transition duration-300" placeholder="Max Mustermann" />
                </div>

                <!-- Kategorie -->
                <div>

                  <label class="block mb-3
       text-xs
       uppercase
       tracking-[0.25em]
       text-wedding-light/80
       font-light">
                    Bringst du einen Salat für das Buffet oder ein Häppchen für den Sektempfang mit ?
                  </label>

                  <select name="kategorie" required class="w-full
       bg-white/5
       border border-white/10
       rounded-2xl
       px-5 py-4
       text-wedding-cream
       placeholder:text-wedding-light/40
       font-light
       tracking-wide
       backdrop-blur-sm
       focus:outline-none
       focus:border-wedding-gold
       focus:bg-white/10
       transition duration-300">
                    <option value="">Bitte auswählen</option>
                    <option>Salat(Buffet)</option>
                    <option>Happen(Sektempfang)</option>
                  </select>
                </div>

                <!-- Snack -->
                <div>
                  <label class="block mb-3
       text-xs
       uppercase
       tracking-[0.25em]
       text-wedding-light/80
       font-light">
                    Welchen Salat(Buffet) oder Happen(Sektempfang) bringst du mit?
                  </label>

                  <input type="text" name="snack" required class="w-full
       bg-white/5
       border border-white/10
       rounded-2xl
       px-5 py-4
       text-wedding-cream
       placeholder:text-wedding-light/40
       font-light
       tracking-wide
       backdrop-blur-sm
       focus:outline-none
       focus:border-wedding-gold
       focus:bg-white/10
       transition duration-300" placeholder="z.B. Kartoffelsalat" />
                </div>

                <!-- Button -->
                <button type="submit" class="w-full
                 rounded-2xl
                 bg-[#b99272]
                 hover:bg-[#c8a58b]
                 text-[#3d2f29]
                 font-light
                 tracking-wide
                 py-4
                 transition duration-300">
                  Absenden
                </button>

              </form>

              <!-- Status -->
              <div id="status" class="text-center
         mt-8
         text-sm
         tracking-[0.2em]
         uppercase
         text-wedding-light/70">
                <div class="mt-10">

                  <p class="text-wedding-light text-sm">
                    Vielen Dank, dass ihr diesen besonderen Tag
                    mit uns feiert!
                  </p>

                  <p class="font-signature text-5xl mt-4 text-wedding-light">
                    Larissa & Markus
                  </p>

                </div>
              </div>
              <!-- Bereits eingetragene Salate -->

              <div class="p-10">

                <h2 class=class="font-heading
           text-5xl
           font-light
           tracking-wide
           text-wedding-cream
           mb-8">
                  Bereits eingetragene Salate/Happen
                </h2>

                <div id="snackListe" class="space-y-3">
                  <!-- Dynamisch eingefügt -->
                </div>

              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <script>

      // =========================
      // Einstellungen
      // =========================

      const PAGE_PASSWORD = "hochzeit2026";

      const scriptURL =
        "https://script.google.com/macros/s/AKfycbz_V4lc4a5YaLcZegeDyBw2CsmnmdhVKoTvr2G7yhLqORcGdYVX-AiKKpt5yrShvqlIRA/exec";

      const SECRET_KEY =
        "sailesecret2026";


      // =========================
      // Passwort prüfen
      // =========================

      function checkPassword() {

        const input =
          document.getElementById("passwordInput").value;

        if (input === PAGE_PASSWORD) {

          document
            .getElementById("loginBox")
            .classList.add("hidden");

          document
            .getElementById("app")
            .classList.remove("hidden");

          sessionStorage.setItem("loggedIn", "true");
          loadEntries();

        } else {

          document
            .getElementById("loginError")
            .innerText = "Falsches Passwort";

        }
      }


      // Bereits eingeloggt?
      if (sessionStorage.getItem("loggedIn") === "true") {

        window.addEventListener("load", () => {

          document
            .getElementById("loginBox")
            .classList.add("hidden");

          document
            .getElementById("app")
            .classList.remove("hidden");

          loadEntries();

        });
      }


      // =========================
      // Formular absenden
      // =========================

      const form =
        document.getElementById("snackForm");

      const status =
        document.getElementById("status");


      form.addEventListener("submit", async (e) => {

        e.preventDefault();

        const formData = new FormData(form);

        const data = {

          secret: SECRET_KEY,

          name:
            formData.get("name"),

          kategorie: formData.get("kategorie"),
          snack: formData.get("snack")

        };


        status.innerText = "Speichert...";


        try {

          const response = await fetch(scriptURL, {

            method: "POST",

            body: JSON.stringify(data)

          });


          if (response.ok) {

            status.innerText =
              "Danke 🙂 Eingetragen!";

            form.reset();
            loadEntries();

          } else {

            status.innerText =
              "Fehler beim Speichern.";

          }

        } catch (error) {

          status.innerText =
            "Netzwerkfehler.";

        }

      });

      // =========================
      // Vorhandene Einträge laden
      // =========================

      async function loadEntries() {

        const liste =
          document.getElementById("snackListe");

        liste.innerHTML =
          "<p class='text-gray-500'>Lade...</p>";

        try {

          const response =
            await fetch(`${scriptURL}?secret=${SECRET_KEY}`)

          const data =
            await response.json();

          // Neueste zuerst
          data.reverse();

          if (data.length === 0) {

            liste.innerHTML =
              "<p>Noch keine Einträge vorhanden.</p>";

            return;
          }

          liste.innerHTML = "";

          data.forEach(entry => {

            const div =
              document.createElement("div");

            div.className =
              "group rounded-3xl border border-white/10 bg-white/[0.03] backdrop-blur-sm px-6 py-5 transition duration-300 hover:bg-white/[0.06]";

            div.innerHTML = `
  <div class="flex items-center justify-between gap-6">

    <div class="min-w-0">

      <p class="
          font-heading
          text-3xl
          font-light
          tracking-wide
          text-wedding-cream
        ">
        ${entry.name}
      </p>

      <p class="
          mt-1
          text-sm
          uppercase
          tracking-[0.2em]
          text-wedding-light/70
        ">
        ${entry.kategorie}
      </p>

    </div>

    <div class="
        text-right
        text-wedding-light
        font-light
        tracking-wide
      ">

      ${entry.snack}

    </div>

  </div>
`;

            liste.appendChild(div);

          });

        } catch (error) {

          liste.innerHTML =
            "<p class='text-red-500'>Fehler beim Laden.</p>";

        }
      }

    </script>

</body>

</html>
