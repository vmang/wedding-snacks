<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hochzeit Sailes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Snackliste Hochzeit Sailes</h1>

  <form id="snackForm">
    <input
      type="text"
      name="name"
      placeholder="Dein Name"
      required
    >
    <select 
      name="kategorie"
      placeholder="Kategorie Salat/Happen"
      required
      >
  <option>Salat</option>
  <option>Happen</option>
</select>

    <input
      type="text"
      name="snack"
      placeholder="Welchen Happen/Salat bringst du mit?"
      required
    >

    <button type="submit">
      Absenden
    </button>
  </form>

  <div id="status"></div>

  <script>
    const form = document.getElementById("snackForm");
    const status = document.getElementById("status");

    const scriptURL = "https://script.google.com/macros/s/AKfycbz_V4lc4a5YaLcZegeDyBw2CsmnmdhVKoTvr2G7yhLqORcGdYVX-AiKKpt5yrShvqlIRA/exec";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const data = {
        secret: "sailesecret2026",
        name: formData.get("name"),
        kategorie: formData.get("kategorie"),
        snack: formData.get("snack")
      };

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: JSON.stringify(data)
        });

        if (response.ok) {
          status.innerText = "Danke! Eingetragen 🙂";
          form.reset();
        } else {
          status.innerText = "Fehler beim Speichern.";
        }

      } catch (error) {
        status.innerText = "Netzwerkfehler.";
      }
    });
  </script>

  <script>

  const PAGE_PASSWORD = "hochzeit2026";

  function checkPassword() {
    const input = document.getElementById("passwordInput").value;

    if (input === PAGE_PASSWORD) {

      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");

      sessionStorage.setItem("loggedIn", "true");

    } else {
      document.getElementById("loginError").innerText =
        "Falsches Passwort";
    }
  }

  if (sessionStorage.getItem("loggedIn") === "true") {
    window.addEventListener("load", () => {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
    });
  }

</script>
  
</body>
</html>
