<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hochzeit Salate</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Snackliste Hochzeit Sailes</h1>

  <form id="salatForm">
    <input
      type="text"
      name="name"
      placeholder="Dein Name"
      required
    >

    <input
      type="number"
      name="kategorie"
      placeholder="Kategorie Salat/Happen"
      required
    >

    <input
      type="text"
      name="snack"
      placeholder="Welchen Happen/Salat bringst du mit?"
      required
    >

    <button type="submit">
      Absenden
    </button>
  </form>

  <div id="status"></div>

  <script>
    const form = document.getElementById("salatForm");
    const status = document.getElementById("status");

    const scriptURL = "https://script.google.com/macros/s/AKfycbz_V4lc4a5YaLcZegeDyBw2CsmnmdhVKoTvr2G7yhLqORcGdYVX-AiKKpt5yrShvqlIRA/exec";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const data = {
        name: formData.get("name"),
        personen: formData.get("kategorie"),
        salat: formData.get("snack")
      };

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: JSON.stringify(data)
        });

        if (response.ok) {
          status.innerText = "Danke! Eingetragen 🙂";
          form.reset();
        } else {
          status.innerText = "Fehler beim Speichern.";
        }

      } catch (error) {
        status.innerText = "Netzwerkfehler.";
      }
    });
  </script>

</body>
</html>
