<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hochzeit Larissa und Markus</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400&family=Great+Vibes&display=swap"
    rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {

          colors: {

            wedding: {
              dark: '#4b3a32',
              paper: '#6d574c',
              light: '#d7c1b3',
              cream: '#f4ede7',
              gold: '#c8a58b'
            }

          },

          fontFamily: {

            heading: ['Cormorant Garamond', 'serif'],
            body: ['Montserrat', 'sans-serif'],
            signature: ['Great Vibes', 'cursive']

          }

        }
      }
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }
  </style>

  <style>
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>

<body class="min-h-screen overflow-x-hidden bg-cover bg-center bg-fixed font-body text-wedding-cream"
  style="background-image: url('background_saile.jpg');">

  <!-- Dunkles Overlay -->
  <div class="min-h-screen bg-black/45 backdrop-blur-[2px]">

    <!-- Content -->
    <div class="max-w-6xl mx-auto px-4 md:px-6 py-10 md:py-16">
      <!-- Container -->
      <div class="w-full py-12">

        <!-- Login Box -->
        <div id="loginBox" class="bg-[#5a463d]/70
       backdrop-blur-xl
       border border-white/10
       rounded-[32px]
       shadow-2xl
       p-10">

          <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-wedding-cream">
              Hochzeit Larissa & Markus 2026
            </h1>

            <p class="text-wedding-light mt-2">
              Bitte Passwort eingeben
            </p>
          </div>

          <form id="loginForm" class="space-y-4">

            <input type="password" id="passwordInput" placeholder="Passwort" class="w-full
           bg-white/5
           border border-white/10
           rounded-2xl
           px-5 py-4
           text-wedding-cream
           placeholder:text-wedding-light/40
           font-light
           tracking-wide
           backdrop-blur-sm
           focus:outline-none
           focus:border-wedding-gold
           focus:bg-white/10
           transition duration-300" />

            <button type="submit" class="w-full
           rounded-2xl
           bg-[#b99272]
           hover:bg-[#c8a58b]
           text-[#3d2f29]
           font-light
           tracking-wide
           py-4
           transition duration-300">
              Öffnen
            </button>

          </form>

          <p id="loginError" class="text-red-500 text-center mt-4"></p>
        </div>

        <!-- App -->
        <div id="app" class="hidden">

          <!-- Header -->
          <div class="text-center mb-12">

            <h1 class="font-heading text-6xl md:text-7xl font-light tracking-wide">
              Snackliste Hochzeit Larissa & Markus
            </h1>

            <p class="mt-6 text-wedding-light tracking-[0.15em] md:tracking-[0.25em] uppercase text-sm leading-7">
              Trage ein, welchen Salat (Buffet)
              oder welches Häppchen (Sektempfang)
              du mitbringst
            </p>

          </div>

          <!-- Main Card -->
          <div class="w-full grid lg:grid-cols-2 overflow-hidden rounded-3xl md:rounded-[32px]
           border border-white/10
           bg-[#5a463d]/70
           backdrop-blur-xl
           shadow-2xl">
            <div class="min-w-0 p-6 md:p-12
         border-r border-white/10
         bg-black/5">
              <form id="snackForm" class="space-y-5">

                <!-- Name -->
                <div>
                  <label class="block mb-3
                                text-xs
                                uppercase
                                tracking-[0.15em] md:tracking-[0.25em]
                                text-wedding-light/80
                                font-light">
                    Dein Name
                  </label>

                  <input type="text" name="name" required class="w-full
       bg-white/5
       border border-white/10
       rounded-2xl
       px-5 py-4
       text-wedding-cream
       placeholder:text-wedding-light/40
       font-light
       tracking-wide
       backdrop-blur-sm
       focus:outline-none
       focus:border-wedding-gold
       focus:bg-white/10
       transition duration-300" placeholder="Max Mustermann" />
                </div>

                <!-- Kategorie -->
                <div>

                  <label class="block mb-3
       text-xs
       uppercase
       tracking-[0.15em] md:tracking-[0.25em]
       text-wedding-light/80
       font-light">
                    Bringst du einen Salat für das Buffet oder ein Häppchen für den Sektempfang mit ?
                  </label>

                  <select name="kategorie" required class="w-full
         appearance-none
         bg-[#6b564c]/80
         border border-white/10
         rounded-2xl
         px-5 py-4
         text-wedding-cream
         font-light
         tracking-wide
         backdrop-blur-sm
         focus:outline-none
         focus:border-wedding-gold
         focus:bg-[#746055]
         transition duration-300">
                    <option value="" class="bg-[#5a463d] text-wedding-cream">
                      Bitte auswählen
                    </option>

                    <option class="bg-[#5a463d] text-wedding-cream">
                      Salat (Buffet)
                    </option>

                    <option class="bg-[#5a463d] text-wedding-cream">
                      Häppchen (Sektempfang)
                    </option>
                  </select>
                </div>

                <!-- Snack -->
                <div>
                  <label class="block mb-3
       text-xs
       uppercase
       tracking-[0.15em] md:tracking-[0.25em]
       text-wedding-light/80
       font-light">
                    Welchen Salat(Buffet) oder Häppchen(Sektempfang) bringst du mit?
                  </label>

                  <input type="text" name="snack" required class="w-full
       bg-white/5
       border border-white/10
       rounded-2xl
       px-5 py-4
       text-wedding-cream
       placeholder:text-wedding-light/40
       font-light
       tracking-wide
       backdrop-blur-sm
       focus:outline-none
       focus:border-wedding-gold
       focus:bg-white/10
       transition duration-300" placeholder="z.B. Gurkensalat" />
                </div>

                <!-- Button -->
                <button type="submit" class="w-full
                 rounded-2xl
                 bg-[#b99272]
                 hover:bg-[#c8a58b]
                 text-[#3d2f29]
                 font-light
                 tracking-wide
                 py-4
                 transition duration-300">
                  Absenden
                </button>

              </form>

              <!-- Status -->

              <div id="status" class="text-center
         mt-8
         text-sm
         tracking-[0.2em]
         uppercase
         text-wedding-light/70
         min-h-[24px]"></div>

              <!-- Signatur -->
              <div class="mt-14 text-center">

                <p class="text-wedding-light/80 text-sm tracking-wide">
                  Vielen Dank, dass ihr diesen besonderen Tag
                  mit uns feiert
                </p>

                <p class="font-signature
            text-4xl
            md:text-5xl
            mt-5
            text-wedding-light
            leading-none">
                  Larissa & Markus
                </p>

              </div>
            </div>

            <!-- Bereits eingetragene Salate -->

            <div class="min-w-0 p-6 md:p-10">

              <h2 class="font-heading
         text-4xl
         md:text-5xl
         font-light
         tracking-wide
         text-wedding-cream
         mb-10">
                Bereits eingetragene Salate/Häppchen
              </h2>

              <div class="space-y-6">

                <!-- Salate -->
                <div class="rounded-3xl
           border border-white/10
           bg-white/[0.03]
           overflow-hidden">

                  <button type="button" onclick="toggleSection('salateContent', 'salateIcon')" class="w-full
             flex items-center justify-between
             px-6 py-5
             text-left
             hover:bg-white/[0.03]
             transition">

                    <div>

                      <h3 class="font-heading text-3xl font-light">
                        Salate
                      </h3>

                      <p class="text-xs uppercase tracking-[0.2em] text-wedding-light/60 mt-1">
                        Buffet
                      </p>

                    </div>

                    <span id="salateIcon" class="text-2xl text-wedding-light transition">
                      −
                    </span>

                  </button>

                  <div id="salateContent" class="max-h-[400px]
             overflow-y-auto
             px-6 pb-6
             space-y-4">
                  </div>

                </div>


                <!-- Happen -->
                <div class="rounded-3xl
           border border-white/10
           bg-white/[0.03]
           overflow-hidden">

                  <button type="button" onclick="toggleSection('happenContent', 'happenIcon')" class="w-full
             flex items-center justify-between
             px-6 py-5
             text-left
             hover:bg-white/[0.03]
             transition">

                    <div>

                      <h3 class="font-heading text-3xl font-light">
                        Häppchen
                      </h3>

                      <p class="text-xs uppercase tracking-[0.2em] text-wedding-light/60 mt-1">
                        Sektempfang
                      </p>

                    </div>

                    <span id="happenIcon" class="text-2xl text-wedding-light transition">
                      −
                    </span>

                  </button>

                  <div id="happenContent" class="max-h-[400px]
             overflow-y-auto
             px-6 pb-6
             space-y-4">
                  </div>

                </div>

              </div>

            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

    // =========================
    // Einstellungen
    // =========================

    const PAGE_PASSWORD = "hochzeit2026";

    const scriptURL =
      "https://script.google.com/macros/s/AKfycbz_V4lc4a5YaLcZegeDyBw2CsmnmdhVKoTvr2G7yhLqORcGdYVX-AiKKpt5yrShvqlIRA/exec";

    const SECRET_KEY =
      "sailesecret2026";


    // =========================
    // Passwort prüfen
    // =========================

    function checkPassword() {

      const input =
        document.getElementById("passwordInput").value;

      if (input === PAGE_PASSWORD) {

        document
          .getElementById("loginBox")
          .classList.add("hidden");

        document
          .getElementById("app")
          .classList.remove("hidden");

        sessionStorage.setItem("loggedIn", "true");
        loadEntries();

      } else {

        document
          .getElementById("loginError")
          .innerText = "Falsches Passwort";

      }
    }


    // Bereits eingeloggt?
    if (sessionStorage.getItem("loggedIn") === "true") {

      window.addEventListener("load", () => {

        document
          .getElementById("loginBox")
          .classList.add("hidden");

        document
          .getElementById("app")
          .classList.remove("hidden");

        loadEntries();

      });
    }

    // FORM SUBMIT HANDLER
    document
      .getElementById("loginForm")
      .addEventListener("submit", (e) => {

        e.preventDefault();

        checkPassword();

      });


    // =========================
    // Formular absenden
    // =========================

    const form =
      document.getElementById("snackForm");

    const status =
      document.getElementById("status");


    form.addEventListener("submit", async (e) => {

      e.preventDefault();

      const formData = new FormData(form);

      const data = {

        secret: SECRET_KEY,

        name:
          formData.get("name"),

        kategorie: formData.get("kategorie"),
        snack: formData.get("snack")

      };


      status.innerText = "Speichert...";


      try {

        const response = await fetch(scriptURL, {

          method: "POST",

          body: JSON.stringify(data)

        });


        if (response.ok) {

          status.innerText =
            "Danke 🙂 Eingetragen!";

          form.reset();
          loadEntries();

        } else {

          status.innerText =
            "Fehler beim Speichern.";

        }

      } catch (error) {

        status.innerText =
          "Netzwerkfehler.";

      }

    });

    function toggleSection(contentId, iconId) {

      const content =
        document.getElementById(contentId);

      const icon =
        document.getElementById(iconId);

      if (content.classList.contains("hidden")) {

        content.classList.remove("hidden");

        icon.innerText = "−";

      } else {

        content.classList.add("hidden");

        icon.innerText = "+";

      }
    }

    // =========================
    // Vorhandene Einträge laden
    // =========================

    async function loadEntries() {

      const salateListe =
        document.getElementById("salateContent");

      const happenListe =
        document.getElementById("happenContent");

      salateListe.innerHTML =
        "<p class='text-gray-500'>Lade...</p>";
      happenListe.innerHTML =
        "<p class='text-gray-500'>Lade...</p>";

      try {

        const response =
          await fetch(`${scriptURL}?secret=${SECRET_KEY}`)

        const data =
          await response.json();

        // Neueste zuerst
        data.reverse();

        salateListe.innerHTML = "";
        happenListe.innerHTML = "";

        data.forEach(entry => {

          const div =
            document.createElement("div");

          div.className =
            "group rounded-3xl border border-white/10 bg-white/[0.03] backdrop-blur-sm px-6 py-5 transition duration-300 hover:bg-white/[0.06]";

          div.innerHTML = `
            <div class="
              flex
              flex-col
              sm:flex-row
              sm:items-center
              sm:justify-between
              gap-4
          ">

            <div class="min-w-0">

              <p class="
                  font-heading
                  text-3xl
                  font-light
                  tracking-wide
                  text-wedding-cream
                ">
                ${entry.name}
              </p>

              <p class="
                  mt-1
                  text-sm
                  uppercase
                  tracking-[0.2em]
                  text-wedding-light/70
                ">
                ${entry.kategorie}
              </p>

            </div>

            <div class="
            text-left sm:text-right
            text-wedding-light
            font-light
            tracking-wide
            break-words
            max-w-full
            ">

              ${entry.snack}

            </div>

          </div>
        `;

          if (
            entry.kategorie.includes("Salat")
          ) {

            salateListe.appendChild(div);

          } else if (entry.kategorie.includes("Häppchen")) {

            happenListe.appendChild(div);

          }

        });

        if (!salateListe.innerHTML.trim()) {

          salateListe.innerHTML = `
            <p class="text-wedding-light/60 italic">
              Noch keine Salate eingetragen
            </p>
          `;
        }

        if (!happenListe.innerHTML.trim()) {

          happenListe.innerHTML = `
            <p class="text-wedding-light/60 italic">
              Noch keine Häppchen eingetragen
            </p>
          `;
        }

      } catch (error) {

        salateListe.innerHTML =
          "<p class='text-red-500'>Fehler beim Laden.</p>";

      }
    }

  </script>

</body>

</html>
